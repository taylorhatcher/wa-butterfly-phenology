<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Washington Butterfly Phenology Watch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Washington Butterfly Phenology Watch</h1>
  <p>Tracking whether butterfly species in Washington are appearing earlier than the previous 25 years.</p>

  <button id="load">Load Data</button>

  <div id="summary"></div>
  <h2>Species-Level Anomalies</h2>
  <table id="species-table">
    <thead>
      <tr>
        <th>Species</th>
        <th>Status</th>
        <th>Anomaly (days)</th>
        <th>Baseline DOY</th>
        <th>Current DOY</th>
        <th>Obs (current yr)</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script src="script.js"></script>
</body>
</html>
